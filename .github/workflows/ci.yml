name: Backend CI

on:
  pull_request:
    branches:
      - develop
      - master
  push:
    branches:
      - develop
      - master

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Validate delivery contract
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const requiredHeadings = [
              '## Tracking',
              '## Summary',
              '## Scope',
              '## Acceptance',
              '## Verification',
              '## Risk and rollback'
            ];
            const missingHeadings = requiredHeadings.filter((heading) => !body.includes(heading));
            const issueReference = /(?:refs?|closes?|fixes?|resolves?):\s*(?:[\w.-]+\/[\w.-]+)?#\d+/i;
            const requiredFields = [
              /^- Module:\s*\S+/mi,
              /^- Actor:\s*\S+/mi,
              /^- Store\/site\/business key:\s*\S+/mi,
              /^- In scope:\s*\S+/mi,
              /^- Non-scope:\s*\S+/mi,
              /^- Environment:\s*\S+/mi,
              /^- Rollback:\s*\S+/mi
            ];
            const missingFields = requiredFields
              .map((pattern) => pattern.source)
              .filter((_, index) => !requiredFields[index].test(body));

            if (!issueReference.test(body) || missingHeadings.length > 0 || missingFields.length > 0) {
              core.setFailed([
                'PR delivery contract is incomplete.',
                !issueReference.test(body) ? 'Add `Refs: #<issue>` (cross-repo references are allowed).' : '',
                missingHeadings.length ? `Missing headings: ${missingHeadings.join(', ')}` : '',
                missingFields.length ? 'Fill Module, Actor, Store/site/business key, In scope, Non-scope, Environment, and Rollback.' : ''
              ].filter(Boolean).join('\n'));
            }

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify source-size policy
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          SOURCE_SIZE_BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: |
          python -m unittest discover -s scripts/tests -p 'test_source_size_gate.py'
          python scripts/source_size_gate.py

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Test
        run: mvn -q test
