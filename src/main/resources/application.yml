spring:
  application:
    name: nuono-next-backend
  profiles:
    active: local
  servlet:
    multipart:
      max-file-size: 80MB
      max-request-size: 82MB

server:
  port: 18080

management:
  endpoints:
    web:
      exposure:
        include: health,info

nuono:
  stage: local-bootstrap
  auth:
    session-secret: ${NUONO_NEXT_AUTH_SESSION_SECRET:}
    session-ttl-seconds: ${NUONO_NEXT_AUTH_SESSION_TTL_SECONDS:28800}
    email-code:
      allowed-email: ${NUONO_AUTH_EMAIL_CODE_ALLOWED_EMAIL:}
      login-account-no: ${NUONO_AUTH_EMAIL_CODE_LOGIN_ACCOUNT_NO:}
      ttl-seconds: ${NUONO_AUTH_EMAIL_CODE_TTL_SECONDS:300}
      cooldown-seconds: ${NUONO_AUTH_EMAIL_CODE_COOLDOWN_SECONDS:60}
      max-attempts: ${NUONO_AUTH_EMAIL_CODE_MAX_ATTEMPTS:5}
      code-length: ${NUONO_AUTH_EMAIL_CODE_LENGTH:6}
      subject: ${NUONO_AUTH_EMAIL_CODE_SUBJECT:Nuono 登录验证码}
      smtp:
        port: ${NUONO_AUTH_EMAIL_CODE_SMTP_PORT:465}
        ssl-enabled: ${NUONO_AUTH_EMAIL_CODE_SMTP_SSL_ENABLED:true}
        starttls-enabled: ${NUONO_AUTH_EMAIL_CODE_SMTP_STARTTLS_ENABLED:false}
        connection-timeout-ms: ${NUONO_AUTH_EMAIL_CODE_SMTP_CONNECTION_TIMEOUT_MS:10000}
        timeout-ms: ${NUONO_AUTH_EMAIL_CODE_SMTP_TIMEOUT_MS:10000}
        write-timeout-ms: ${NUONO_AUTH_EMAIL_CODE_SMTP_WRITE_TIMEOUT_MS:10000}
    api-protection:
      enabled: ${NUONO_NEXT_AUTH_API_PROTECTION_ENABLED:true}
  ai:
    enabled: ${NUONO_AI_ENABLED:true}
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://aicodelink.top/v1}
      responses-path: ${OPENAI_RESPONSES_PATH:/responses}
      default-text-model: ${OPENAI_DEFAULT_TEXT_MODEL:gpt-5.5}
      reasoning-effort: ${OPENAI_REASONING_EFFORT:high}
      timeout-seconds: ${OPENAI_TIMEOUT_SECONDS:180}
      store-responses: ${OPENAI_STORE_RESPONSES:false}
      include-metadata: ${OPENAI_INCLUDE_METADATA:false}
      curl-fallback-enabled: ${OPENAI_CURL_FALLBACK_ENABLED:false}
      max-output-tokens: ${OPENAI_MAX_OUTPUT_TOKENS:1200}
  file-management:
    parse:
      ai:
        model: ${NUONO_FILE_PARSE_AI_MODEL:gpt-5.4-mini}
        reasoning-effort: ${NUONO_FILE_PARSE_AI_REASONING_EFFORT:low}
        max-output-tokens: ${NUONO_FILE_PARSE_AI_MAX_OUTPUT_TOKENS:1000}
        timeout-seconds: ${NUONO_FILE_PARSE_AI_TIMEOUT_SECONDS:180}
      retry-scheduler:
        enabled: ${NUONO_FILE_PARSE_RETRY_SCHEDULER_ENABLED:true}
        initial-delay-ms: ${NUONO_FILE_PARSE_RETRY_SCHEDULER_INITIAL_DELAY_MS:30000}
        fixed-delay-ms: ${NUONO_FILE_PARSE_RETRY_SCHEDULER_FIXED_DELAY_MS:60000}
        stale-timeout-seconds: ${NUONO_FILE_PARSE_RETRY_STALE_TIMEOUT_SECONDS:900}
        max-attempts: ${NUONO_FILE_PARSE_RETRY_MAX_ATTEMPTS:5}
        retry-delay-seconds: ${NUONO_FILE_PARSE_RETRY_DELAY_SECONDS:60}
        max-items-per-tick: ${NUONO_FILE_PARSE_RETRY_MAX_ITEMS_PER_TICK:2}
        system-operator-user-id: ${NUONO_FILE_PARSE_RETRY_OPERATOR_USER_ID:10003}
  product-management:
    publish-task:
      async-enabled: ${NUONO_PRODUCT_PUBLISH_TASK_ASYNC_ENABLED:true}
      scheduler:
        enabled: ${NUONO_PRODUCT_PUBLISH_TASK_SCHEDULER_ENABLED:true}
    attribute-template:
      scheduler:
        enabled: ${NUONO_PRODUCT_ATTRIBUTE_TEMPLATE_SCHEDULER_ENABLED:false}
  product-selection:
    source-collection:
      scheduler:
        enabled: ${NUONO_PRODUCT_SELECTION_SOURCE_COLLECTION_SCHEDULER_ENABLED:false}
      amazon-crawler:
        enabled: ${NUONO_PRODUCT_SELECTION_AMAZON_CRAWLER_ENABLED:true}
        url: ${NUONO_PRODUCT_SELECTION_AMAZON_CRAWLER_URL:}
        timeout-seconds: ${NUONO_PRODUCT_SELECTION_AMAZON_CRAWLER_TIMEOUT_SECONDS:90}
        fallback-to-public-page: ${NUONO_PRODUCT_SELECTION_AMAZON_CRAWLER_FALLBACK_TO_PUBLIC_PAGE:false}
      shein-public:
        timeout-seconds: ${NUONO_PRODUCT_SELECTION_SHEIN_PUBLIC_TIMEOUT_SECONDS:20}
      shein-rapidapi:
        enabled: ${NUONO_PRODUCT_SELECTION_SHEIN_RAPIDAPI_ENABLED:true}
        key: ${NUONO_PRODUCT_SELECTION_SHEIN_RAPIDAPI_KEY:}
        currency: ${NUONO_PRODUCT_SELECTION_SHEIN_RAPIDAPI_CURRENCY:USD}
        timeout-seconds: ${NUONO_PRODUCT_SELECTION_SHEIN_RAPIDAPI_TIMEOUT_SECONDS:30}
        description-url: ${NUONO_PRODUCT_SELECTION_SHEIN_RAPIDAPI_DESCRIPTION_URL:}
        details-url: ${NUONO_PRODUCT_SELECTION_SHEIN_RAPIDAPI_DETAILS_URL:}
  procurement:
    ali1688:
      historical-order:
        scheduler:
          enabled: ${NUONO_PROCUREMENT_ALI1688_HISTORICAL_ORDER_SCHEDULER_ENABLED:false}
          cron: "${NUONO_PROCUREMENT_ALI1688_HISTORICAL_ORDER_SCHEDULER_CRON:0 0 3 ? * MON}"
          zone: ${NUONO_PROCUREMENT_ALI1688_HISTORICAL_ORDER_SCHEDULER_ZONE:Asia/Shanghai}
          max-authorizations-per-tick: ${NUONO_PROCUREMENT_ALI1688_HISTORICAL_ORDER_SCHEDULER_MAX_AUTHORIZATIONS_PER_TICK:10}
          recent-scheduled-days: ${NUONO_PROCUREMENT_ALI1688_HISTORICAL_ORDER_SCHEDULER_RECENT_DAYS:6}
          stale-running-minutes: ${NUONO_PROCUREMENT_ALI1688_HISTORICAL_ORDER_SCHEDULER_STALE_RUNNING_MINUTES:120}
          system-operator-user-id: ${NUONO_PROCUREMENT_ALI1688_HISTORICAL_ORDER_SCHEDULER_OPERATOR_USER_ID:10003}
  logistics-auto-sync:
    credential-cipher-secret: ${NUONO_LOGISTICS_CREDENTIAL_CIPHER_SECRET:}
    chic:
      enabled: ${NUONO_LOGISTICS_AUTO_SYNC_CHIC_ENABLED:false}
      base-url: ${NUONO_LOGISTICS_AUTO_SYNC_CHIC_BASE_URL:https://erp.chicexpressglobal.com}
      login-path: ${NUONO_LOGISTICS_AUTO_SYNC_CHIC_LOGIN_PATH:/api/login}
      login-account-field: ${NUONO_LOGISTICS_AUTO_SYNC_CHIC_LOGIN_ACCOUNT_FIELD:username}
      login-password-field: ${NUONO_LOGISTICS_AUTO_SYNC_CHIC_LOGIN_PASSWORD_FIELD:password}
      timeout-seconds: ${NUONO_LOGISTICS_AUTO_SYNC_CHIC_TIMEOUT_SECONDS:30}
    et:
      enabled: ${NUONO_LOGISTICS_AUTO_SYNC_ET_ENABLED:false}
      base-url: ${NUONO_LOGISTICS_AUTO_SYNC_ET_BASE_URL:https://wl.et-global.cn}
      login-path: ${NUONO_LOGISTICS_AUTO_SYNC_ET_LOGIN_PATH:}
      login-account-field: ${NUONO_LOGISTICS_AUTO_SYNC_ET_LOGIN_ACCOUNT_FIELD:username}
      login-password-field: ${NUONO_LOGISTICS_AUTO_SYNC_ET_LOGIN_PASSWORD_FIELD:password}
      login-payload-type: ${NUONO_LOGISTICS_AUTO_SYNC_ET_LOGIN_PAYLOAD_TYPE:form}
      timeout-seconds: ${NUONO_LOGISTICS_AUTO_SYNC_ET_TIMEOUT_SECONDS:30}
    yite:
      enabled: ${NUONO_LOGISTICS_AUTO_SYNC_YITE_ENABLED:false}
      base-url: ${NUONO_LOGISTICS_AUTO_SYNC_YITE_BASE_URL:https://ywyite.nextsls.com}
      login-path: ${NUONO_LOGISTICS_AUTO_SYNC_YITE_LOGIN_PATH:/rest/tms/wos/auth/login?redirect_url=%2Ftms%2Fwos}
      login-account-field: ${NUONO_LOGISTICS_AUTO_SYNC_YITE_LOGIN_ACCOUNT_FIELD:username}
      login-password-field: ${NUONO_LOGISTICS_AUTO_SYNC_YITE_LOGIN_PASSWORD_FIELD:password}
      login-payload-type: ${NUONO_LOGISTICS_AUTO_SYNC_YITE_LOGIN_PAYLOAD_TYPE:json}
      timeout-seconds: ${NUONO_LOGISTICS_AUTO_SYNC_YITE_TIMEOUT_SECONDS:30}
    scheduler:
      enabled: ${NUONO_LOGISTICS_AUTO_SYNC_SCHEDULER_ENABLED:false}
      cron: "${NUONO_LOGISTICS_AUTO_SYNC_SCHEDULER_CRON:0 */30 * * * *}"
      zone: ${NUONO_LOGISTICS_AUTO_SYNC_SCHEDULER_ZONE:Asia/Shanghai}
      max-accounts-per-tick: ${NUONO_LOGISTICS_AUTO_SYNC_MAX_ACCOUNTS_PER_TICK:5}
  noon:
    auth:
      email-otp:
        email: ${NUONO_NOON_MERCHANT_EMAIL_OTP_EMAIL:}
        mail-auth-code: ${NUONO_NOON_MERCHANT_EMAIL_OTP_MAIL_AUTH_CODE:}
    pull:
      scheduler:
        enabled: ${NUONO_NOON_PULL_SCHEDULER_ENABLED:false}
        initial-delay-ms: ${NUONO_NOON_PULL_SCHEDULER_INITIAL_DELAY_MS:60000}
        fixed-delay-ms: ${NUONO_NOON_PULL_SCHEDULER_FIXED_DELAY_MS:300000}
  competitor-analysis:
    noon-search:
      frontend-cookie-header: ${NUONO_COMPETITOR_ANALYSIS_NOON_SEARCH_FRONTEND_COOKIE_HEADER:}
    monitor:
      scheduler:
        enabled: ${NUONO_COMPETITOR_ANALYSIS_MONITOR_SCHEDULER_ENABLED:false}
        rank-cron: "${NUONO_COMPETITOR_ANALYSIS_MONITOR_RANK_CRON:0 0 0,6,12,18 * * *}"
        detail-cron: "${NUONO_COMPETITOR_ANALYSIS_MONITOR_DETAIL_CRON:0 0 2 * * *}"
        zone: ${NUONO_COMPETITOR_ANALYSIS_MONITOR_SCHEDULER_ZONE:Asia/Shanghai}
        max-scopes-per-tick: ${NUONO_COMPETITOR_ANALYSIS_MONITOR_MAX_SCOPES_PER_TICK:100}
  bootstrap:
    db-enabled: false
    schema: nuono_new_dev
    expected-core-tables:
      - role
      - menu
      - role_menu
      - user
      - user_menu
      - user_store

  product-public-detail:
    noon:
      connect-timeout-seconds: ${NUONO_PRODUCT_PUBLIC_DETAIL_NOON_CONNECT_TIMEOUT_SECONDS:5}
      request-timeout-seconds: ${NUONO_PRODUCT_PUBLIC_DETAIL_NOON_REQUEST_TIMEOUT_SECONDS:20}
      public-base-url: ${NUONO_PRODUCT_PUBLIC_DETAIL_NOON_PUBLIC_BASE_URL:https://www.noon.com}
      catalog-base-url: ${NUONO_PRODUCT_PUBLIC_DETAIL_NOON_CATALOG_BASE_URL:https://noon-catalog.noon.partners/_svc/catalog/api/u}
      customer-catalog-v3-base-url: ${NUONO_PRODUCT_PUBLIC_DETAIL_NOON_CUSTOMER_CATALOG_V3_BASE_URL:https://www.noon.com/_vs/nc/mp-customer-catalog-api/api/v3/u}
      frontend-cookie-header: ${NUONO_PRODUCT_PUBLIC_DETAIL_NOON_FRONTEND_COOKIE_HEADER:}
      chrome-frontend-cookie-enabled: ${NUONO_PRODUCT_PUBLIC_DETAIL_NOON_CHROME_FRONTEND_COOKIE_ENABLED:false}
      curl-enabled: ${NUONO_PRODUCT_PUBLIC_DETAIL_NOON_CURL_ENABLED:true}
      catalog-partner-fallback-enabled: ${NUONO_PRODUCT_PUBLIC_DETAIL_NOON_CATALOG_PARTNER_FALLBACK_ENABLED:false}
    scheduler:
      enabled: ${NUONO_PRODUCT_PUBLIC_DETAIL_SCHEDULER_ENABLED:false}
      cron: "${NUONO_PRODUCT_PUBLIC_DETAIL_SCHEDULER_CRON:0 30 3 * * *}"
      zone: ${NUONO_PRODUCT_PUBLIC_DETAIL_SCHEDULER_ZONE:Asia/Shanghai}
      max-scopes-per-tick: ${NUONO_PRODUCT_PUBLIC_DETAIL_SCHEDULER_MAX_SCOPES_PER_TICK:50}
      max-products-per-task: ${NUONO_PRODUCT_PUBLIC_DETAIL_SCHEDULER_MAX_PRODUCTS_PER_TASK:100}
      stale-days: ${NUONO_PRODUCT_PUBLIC_DETAIL_SCHEDULER_STALE_DAYS:1}
      failure-cooldown-hours: ${NUONO_PRODUCT_PUBLIC_DETAIL_SCHEDULER_FAILURE_COOLDOWN_HOURS:12}

mobile:
  auth:
    access-token-expire: 7200
    refresh-token-expire: 2592000
    bind-token-expire: 600
    sms-code-expire: 300
    sms-cooldown-seconds: 60
    fixed-sms-code: ${NUONO_NEXT_MOBILE_FIXED_SMS_CODE:}
    debug-code-enabled: ${NUONO_NEXT_MOBILE_DEBUG_CODE_ENABLED:false}
  wechat:
    app-id: ${NUONO_NEXT_MOBILE_WECHAT_APP_ID:}
    app-secret: ${NUONO_NEXT_MOBILE_WECHAT_APP_SECRET:}
    code2session-url: https://api.weixin.qq.com/sns/jscode2session
    fallback-to-code: ${NUONO_NEXT_MOBILE_WECHAT_FALLBACK_TO_CODE:true}
